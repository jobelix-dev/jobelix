name: CI

on:
  push:
    branches:
      - dev

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # Cache npm download dir — speeds up install on cache miss
          cache: npm

      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Lint + Typecheck (parallel)
        run: |
          npm run lint:ci & LINT_PID=$!
          npx tsc --noEmit & TSC_PID=$!
          wait $LINT_PID; LINT_EXIT=$?
          wait $TSC_PID; TSC_EXIT=$?
          [ $LINT_EXIT -eq 0 ] && [ $TSC_EXIT -eq 0 ]

  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run tests
        run: NODE_OPTIONS='--max-old-space-size=4096' npx vitest run --reporter=verbose
